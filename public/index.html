<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🍌 Banana Party HG</title>
<style>
/* ── VARIABLES ESTILO BRAWL ───────────────────────────── */
:root {
  --brawl-blue: #0081f2;
  --brawl-yellow: #fdd835;
  --brawl-orange: #ff9900;
  --brawl-red: #e74c3c;
  --bg-dark: #1a0a2e;
  --card-bg: rgba(0, 0, 0, 0.6);
  --font-main: 'Arial Black', 'Segoe UI', sans-serif;
}

/* ── RESET & BASE ─────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-main);
  background: var(--bg-dark);
  color: #fff;
  overflow: hidden;
  height: 100vh;
  text-transform: uppercase; /* Estilo muy común en juegos competitivos */
}

/* ── BOTONES ESTILO SUPERCELL ─────────────────────────── */
.btn-brawl {
  position: relative;
  background: linear-gradient(#ffcc00, #ff9900);
  border: 4px solid #000;
  border-radius: 12px;
  color: #000;
  padding: 12px 24px;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 0 #b36b00;
  text-shadow: 1px 1px 0 #fff;
  transition: transform 0.05s, box-shadow 0.05s;
  display: inline-block;
  text-decoration: none;
  min-width: 140px;
}
.btn-brawl:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #b36b00;
}
.btn-blue { background: linear-gradient(#00a2ff, #0066ff); box-shadow: 0 6px 0 #0044aa; }
.btn-red { background: linear-gradient(#ff5f5f, #e74c3c); box-shadow: 0 6px 0 #8b0000; }

/* ── LAYOUT DE PANTALLAS ──────────────────────────────── */
.screen {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  z-index: 10; padding: 20px;
  background: radial-gradient(circle, #2d1b4e 0%, #1a0a2e 100%);
}
.screen.active { display: flex; flex-direction: column; }

.card {
  background: var(--card-bg);
  border: 4px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 30px;
  width: 100%; max-width: 400px;
  text-align: center;
  backdrop-filter: blur(10px);
}

/* ── HUD SUPERIOR ─────────────────────────────────────── */
#hud {
  position: fixed; top: 0; width: 100%; height: 65px;
  display: none; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 100;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}
.stat-box {
  background: rgba(0,0,0,0.7);
  padding: 5px 15px;
  border-radius: 25px;
  border: 2px solid #555;
  display: flex; align-items: center; gap: 8px;
  font-size: 14px;
}

/* ── CANVAS Y FONDO ───────────────────────────────────── */
#game-container { position: absolute; inset: 0; z-index: 1; }
#bg-stars { position: absolute; inset: 0; pointer-events: none; }
.star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.3; }

/* ── INPUTS ───────────────────────────────────────────── */
input {
  width: 100%; padding: 12px; margin-bottom: 15px;
  border-radius: 10px; border: 3px solid #000;
  font-family: sans-serif; font-weight: bold; font-size: 16px;
}
</style>
</head>
<body>

  <div id="bg-stars"></div>

  <div id="hud">
    <div class="stat-box">🏆 <span id="u-palmeras">0</span></div>
    <div style="font-size: 12px; color: var(--brawl-yellow);" id="u-name">JUGADOR</div>
    <div class="stat-box">💰 <span id="u-coins">100</span></div>
  </div>

  <div id="screen-auth" class="screen active">
    <div class="card">
      <h1 style="color: var(--brawl-yellow); margin-bottom: 20px; font-size: 32px; text-shadow: 3px 3px 0 #000;">BANANA PARTY</h1>
      <input type="text" id="auth-user" placeholder="USUARIO">
      <input type="password" id="auth-pass" placeholder="CONTRASEÑA">
      <div style="display: grid; gap: 10px;">
        <button class="btn-brawl" onclick="G.showAuth(false)">ENTRAR</button>
        <button class="btn-brawl btn-blue" onclick="G.showAuth(true)">REGISTRARSE</button>
      </div>
    </div>
  </div>

  <div id="screen-lobby" class="screen">
    <div class="card" style="max-width: 500px;">
      <h2 style="margin-bottom: 20px;">MENÚ PRINCIPAL</h2>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button class="btn-brawl" onclick="G.startSearch()" id="btn-play">¡JUGAR!</button>
        <button class="btn-brawl btn-blue" onclick="G.showScreen('screen-shop')">TIENDA</button>
        <button class="btn-brawl btn-blue" onclick="G.showScreen('screen-leaderboard')">RANKING</button>
        <button class="btn-brawl btn-red" onclick="location.reload()">SALIR</button>
      </div>
      <div id="queue-status" style="margin-top: 20px; font-size: 12px; color: var(--brawl-yellow);"></div>
    </div>
  </div>

  <div id="screen-shop" class="screen">
    <div class="card" style="max-width: 600px;">
      <button class="btn-brawl btn-red" onclick="G.showScreen('screen-lobby')" style="padding: 5px 15px; font-size: 14px; margin-bottom: 10px;">ATRÁS</button>
      <h2>SKINS DISPONIBLES</h2>
      <div id="shop-list" style="display: flex; overflow-x: auto; gap: 15px; padding: 20px 0;">
        </div>
    </div>
  </div>

  <div id="screen-game" class="screen" style="padding: 0; background: #000;">
    <div id="game-container">
      <canvas id="board-canvas"></canvas>
    </div>
    <div id="ui-game" style="position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: none;">
        <div id="turn-msg" style="background: rgba(0,0,0,0.8); display: inline-block; padding: 10px 20px; border-radius: 15px; border: 2px solid var(--brawl-yellow); pointer-events: auto;">
            ESPERANDO...
        </div>
    </div>
  </div>

  <div id="screen-leaderboard" class="screen">
    <div class="card">
        <button class="btn-brawl btn-red" onclick="G.showScreen('screen-lobby')" style="margin-bottom: 15px;">ATRÁS</button>
        <h2>TOP MUNDIAL</h2>
        <div id="lb-list" style="margin-top: 15px; text-align: left;"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/animals.js"></script>
  <script src="/js/minigames.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/game.js"></script>

  <script>
    // Inicialización de fondo decorativo
    document.addEventListener('DOMContentLoaded', () => {
      const bg = document.getElementById('bg-stars');
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        bg.appendChild(s);
      }
      // Inicializar el controlador del juego
      if(typeof G !== 'undefined') G.init();
    });
  </script>
</body>
</html>
