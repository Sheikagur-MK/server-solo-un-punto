<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEO-STORM 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <section id="authScreen" class="screen active">
      <div class="card">
        <h1>GEO-STORM</h1>
        <button onclick="joinGame()">INICIAR SISTEMA</button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <canvas id="gameCanvas"></canvas>
      <div class="hud">
        <div id="status">VIVOS: 0</div>
      </div>
    </section>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>    <section id="lobbyScreen" class="screen">
      <div class="lobby-shell">
        <aside class="panel profile">
          <div class="avatar-wrap"><canvas id="avatarCanvas"></canvas></div>
          <h3 id="welcomeUser">Jugador</h3>
          <p id="coinsLabel" class="muted">0 coins</p>
          <button id="logoutBtn" class="btn ghost">Cerrar sesion</button>
        </aside>
        <main class="panel menu">
          <h2>Lobby</h2>
          <div class="menu-grid">
            <button id="btnOnline" class="btn big">Iniciar partida online</button>
            <button id="btnTutorial" class="btn big ghost">Tutorial</button>
            <button id="btnPrivate" class="btn big ghost">Partida privada</button>
            <button id="btnOptions" class="btn big ghost">Opciones</button>
            <button id="btnStore" class="btn big ghost">Tienda</button>
          </div>
          <p id="lobbyMsg" class="muted"></p>
          <div class="rooms">
            <h4>Salas activas</h4>
            <ul id="roomsList"></ul>
          </div>
        </main>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <canvas id="gameCanvas"></canvas>
      <div class="game-ui">
        <div id="gameTopLeft" class="chip">Sala</div>
        <div class="cooldowns">
          <div id="cooldownPulse" class="chip cd-chip">PULSE listo</div>
          <div id="cooldownDash" class="chip cd-chip">DASH listo</div>
        </div>
        <div id="gameTopRight" class="chip">Vivos: 0</div>
        <div id="hpBars" class="hp-bars"></div>
      </div>
      <div id="touchMove" class="touch-move">
        <div id="touchStick" class="touch-stick"></div>
      </div>
      <button id="touchPulse" class="touch-btn">PULSE</button>
      <button id="touchDash" class="touch-btn dash">DASH</button>
      <button id="backLobbyBtn" class="btn tiny">Volver al lobby</button>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
        <div id="character-preview"></div> </section>

    <section id="screen-game" class="screen">
        <canvas id="game-canvas"></canvas>
        <div class="game-hud">
            <div class="vitals">
                <div class="hp-label">SINCRONIZACIÓN</div>
                <div class="hp-bar"><div id="hp-fill"></div></div>
            </div>
            <div id="match-stats">ENEMIGOS: 100 | SECTOR: ALPHA</div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>                <button onclick="startGame()" class="btn-mega">INICIAR BATTLE ROYALE (100 JUGADORES)</button>
                <div class="grid-menu">
                    <button onclick="openStore()">TIENDA DE SKINS</button>
                    <button onclick="openOptions()">CONFIGURACIÓN</button>
                    <button onclick="logout()">DESCONECTAR</button>
                </div>
            </div>
        </div>
        <div id="preview-container"></div> </section>

    <section id="game-screen">
        <canvas id="render-canvas"></canvas>
        <div class="game-hud">
            <div class="hp-bar-container"><div id="hp-fill"></div></div>
            <div id="game-stats">VIVOS: 100 | POS: 0, 0</div>
            <div id="ability-icon">HABILIDAD LISTA</div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
