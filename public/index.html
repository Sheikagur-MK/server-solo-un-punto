<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PULSE ARENA 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        .main-menu { position: absolute; width: 100%; height: 100%; z-index: 100; background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        
        /* Tienda UI */
        #shop-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; display: none; z-index: 200; }
        .skin-opt { width: 50px; height: 50px; border-radius: 50%; margin: 10px; cursor: pointer; display: inline-block; border: 2px solid white; }

        /* Controles Móvil */
        #touch-ui { position: fixed; bottom: 40px; width: 100%; display: none; justify-content: space-around; z-index: 150; }
        #joystick { width: 100px; height: 100px; background: var(--glass); border-radius: 50%; border: 1px solid var(--accent); position: relative; }
        #stick { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        .btn-touch { width: 70px; height: 70px; border-radius: 50%; background: var(--glass); border: 2px solid var(--accent); color: white; font-weight: bold; }

        .btn-action { width: 300px; padding: 15px; margin: 10px; border: none; border-radius: 12px; background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu-screen" class="main-menu">
        <div class="glass-panel">
            <h1>PULSE <span style="color:var(--accent)">2026</span></h1>
            <div id="user-stats">COINS: <span id="coin-val">1000</span></div>
            <button class="btn-action" onclick="enterGame()">BUSCAR PARTIDA</button>
            <button class="btn-action" onclick="toggleShop(true)" style="background: #1e293b;">TIENDA DE SKINS</button>
        </div>
    </div>

    <div id="shop-menu" class="glass-panel">
        <h3>EQUIPAMIENTO</h3>
        <div class="skin-opt" style="background: #f43f5e;" onclick="buySkin('#f43f5e', 500)"></div>
        <div class="skin-opt" style="background: #10b981;" onclick="buySkin('#10b981', 800)"></div>
        <button class="btn-action" onclick="toggleShop(false)">CERRAR</button>
    </div>

    <div id="touch-ui">
        <div id="joystick"><div id="stick"></div></div>
        <button class="btn-touch" onclick="triggerPulse()">PULSO</button>
    </div>

    <canvas id="game-canvas" style="display:none;"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const isMobile = /Android|iPhone/i.test(navigator.userAgent);
        let myData = { username: "User_" + Math.floor(Math.random()*999), coins: 1000 };

        // AUTO-DETECCIÓN DE CONTROLES
        window.onload = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(isMobile) document.getElementById('touch-ui').style.display = 'flex';
            else window.addEventListener('keydown', handleKeyboard);
        };

        function handleKeyboard(e) {
            if(e.code === 'Space') triggerPulse();
            // Controles WASD aquí...
        }

        function toggleShop(show) { document.getElementById('shop-menu').style.display = show ? 'block' : 'none'; }

        async function buySkin(color, price) {
            const res = await fetch('/api/buy-skin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: myData.username, skinColor: color, price: price })
            });
            const data = await res.json();
            if(data.success) {
                myData.coins = data.coins;
                document.getElementById('coin-val').innerText = data.coins;
                alert("Skin Equipada");
            }
        }

        function enterGame() {
            document.getElementById('menu-screen').style.display = 'none';
            canvas.style.display = 'block';
            socket.emit('joinArena', { username: myData.username });
            requestAnimationFrame(gameLoop);
        }

        function triggerPulse() { socket.emit('emitPulse'); }

        // JOYSTICK ANDROID LÓGICA
        if(isMobile) {
            const stick = document.getElementById('stick');
            document.getElementById('joystick').addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const rect = e.target.getBoundingClientRect();
                let x = touch.clientX - rect.left - 50;
                let y = touch.clientY - rect.top - 50;
                stick.style.left = (x + 30) + 'px';
                stick.style.top = (y + 30) + 'px';
                // Emitir movimiento al server...
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Dibujar jugadores con tu estilo "Cristal" de index (7).html
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
