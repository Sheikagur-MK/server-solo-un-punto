<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON STRIKE | Global Arena</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --neon: #0ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* Canvas de Juego */
        #game-canvas { display: none; background: #000; width: 100vw; height: 100vh; }
        
        /* Controles Móvil (Joystick) */
        #joystick-container { 
            position: fixed; bottom: 50px; left: 50px; width: 120px; height: 120px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; display: none; touch-action: none;
        }
        #joystick-handle { 
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; 
            background: var(--neon); border-radius: 50%; box-shadow: 0 0 15px var(--neon);
        }

        .btn-menu { padding: 15px 40px; background: transparent; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; font-size: 20px; }
        .logo { font-size: 50px; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <div class="logo">NEON STRIKE</div>
        <button class="btn-menu" onclick="startGame()">ENTRAR A LA ARENA</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="joystick-container">
        <div id="joystick-handle"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const joystick = document.getElementById('joystick-container');
        const handle = document.getElementById('joystick-handle');

        let players = {};
        let myId = null;
        let keys = {};
        let moveSpeed = 4;

        // Ajustar canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startGame() {
            document.getElementById('menu-screen').classList.remove('active');
            canvas.style.display = 'block';
            if ('ontouchstart' in window) joystick.style.display = 'block'; // Solo en celulares
            socket.emit('joinRoom');
        }

        // --- LÓGICA DE RED ---
        socket.on('init', (serverPlayers) => {
            players = serverPlayers;
            myId = socket.id;
            requestAnimationFrame(gameLoop);
        });

        socket.on('newPlayer', (player) => { players[player.id] = player; });
        socket.on('playerMoved', (player) => { players[player.id] = player; });
        socket.on('playerDisconnected', (id) => { delete players[id]; });

        // --- CONTROLES PC ---
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- CONTROLES MÓVIL (JOYSTICK) ---
        let drag = false;
        joystick.addEventListener('touchstart', () => drag = true);
        window.addEventListener('touchend', () => {
            drag = false;
            handle.style.top = '35px';
            handle.style.left = '35px';
        });

        window.addEventListener('touchmove', (e) => {
            if (!drag) return;
            const rect = joystick.getBoundingClientRect();
            const touch = e.touches[0];
            let x = touch.clientX - rect.left - 60;
            let y = touch.clientY - rect.top - 60;
            
            const distance = Math.min(Math.sqrt(x*x + y*y), 50);
            const angle = Math.atan2(y, x);
            
            x = Math.cos(angle) * distance;
            y = Math.sin(angle) * distance;

            handle.style.left = (x + 35) + 'px';
            handle.style.top = (y + 35) + 'px';

            // Mover jugador
            if (players[myId]) {
                players[myId].x += (x / 50) * moveSpeed;
                players[myId].y += (y / 50) * moveSpeed;
                socket.emit('move', { x: players[myId].x, y: players[myId].y });
            }
        });

        function gameLoop() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar Grid de fondo
            ctx.strokeStyle = '#111';
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Movimiento PC
            if (players[myId]) {
                let moved = false;
                if (keys['KeyW'] || keys['ArrowUp']) { players[myId].y -= moveSpeed; moved = true; }
                if (keys['KeyS'] || keys['ArrowDown']) { players[myId].y += moveSpeed; moved = true; }
                if (keys['KeyA'] || keys['ArrowLeft']) { players[myId].x -= moveSpeed; moved = true; }
                if (keys['KeyD'] || keys['ArrowRight']) { players[myId].x += moveSpeed; moved = true; }
                
                if (moved) socket.emit('move', { x: players[myId].x, y: players[myId].y });
            }

            // Dibujar Jugadores
            for (let id in players) {
                let p = players[id];
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                
                // Dibujar forma de nave/punto
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // Nombre del jugador
                ctx.shadowBlur = 0;
                ctx.fillStyle = "white";
                ctx.fillText(id === myId ? "TÚ" : "ENEMIGO", p.x - 10, p.y - 25);
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
