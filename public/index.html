<!DOCTYPE html>
<html>
<head>
    <title>Global Neon Arena</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: sans-serif; }
        canvas { display: block; background: radial-gradient(circle, #111, #000); }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Jugadores online: <span id="count">0</span></div>
    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let localPlayer = { x: 100, y: 100, speed: 5 };
        let allPlayers = {};

        // Controles
        const keys = {};
        window.onkeydown = (e) => keys[e.key] = true;
        window.onkeyup = (e) => keys[e.key] = false;

        socket.on('updatePlayers', (data) => {
            allPlayers = data;
            document.getElementById('count').innerText = Object.keys(data).length;
        });

        function loop() {
            // Lógica de movimiento local
            let moved = false;
            if (keys['ArrowUp'] || keys['w']) { localPlayer.y -= localPlayer.speed; moved = true; }
            if (keys['ArrowDown'] || keys['s']) { localPlayer.y += localPlayer.speed; moved = true; }
            if (keys['ArrowLeft'] || keys['a']) { localPlayer.x -= localPlayer.speed; moved = true; }
            if (keys['ArrowRight'] || keys['d']) { localPlayer.x += localPlayer.speed; moved = true; }

            if (moved) {
                socket.emit('move', { x: localPlayer.x, y: localPlayer.y });
            }

            // Dibujado
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let id in allPlayers) {
                let p = allPlayers[id];
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                ctx.fill();
                
                if (id === socket.id) {
                    ctx.strokeStyle = '#fff';
                    ctx.stroke();
                }
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
