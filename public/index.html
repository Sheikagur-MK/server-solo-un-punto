<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geo-Flux Arena</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #shop-btn { position: absolute; bottom: 20px; right: 20px; padding: 15px; background: #333; color: #0f0; border: 2px solid #0f0; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Geo-Flux: Arena</h1>
        <p>Puntos: <span id="score">0</span></p>
    </div>
    <button id="shop-btn">TIENDA (LINAS)</button>
    <canvas id="gameCanvas"></canvas>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
